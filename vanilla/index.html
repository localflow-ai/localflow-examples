<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalFlow — Vanilla Example</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif; font-size: 14px;
        background: #0f0f0f; color: #f0f0f0;
        height: 100vh; display: flex; flex-direction: column;
      }
      #app { display: flex; flex: 1; overflow: hidden; }

      /* Sidebar */
      #sidebar {
        width: 300px; display: flex; flex-direction: column;
        border-right: 1px solid #222; background: #111;
      }
      #sidebar-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px 16px; border-bottom: 1px solid #222;
      }
      #key-btn {
        background: none; border: none; cursor: pointer;
        font-size: 14px; opacity: 0.6; padding: 2px; color: #f0f0f0;
      }
      #upload-label {
        display: block; padding: 10px 16px;
        border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 13px; color: #888;
      }
      #upload-label.loaded { color: #7cf; }
      #messages {
        flex: 1; overflow-y: auto; padding: 12px 16px;
        display: flex; flex-direction: column; gap: 8px;
      }
      .bubble {
        border-radius: 10px; padding: 6px 10px;
        max-width: 85%; font-size: 12px; line-height: 1.5;
      }
      .bubble.user { align-self: flex-end; background: #1d4ed8; color: #fff; }
      .bubble.ai   { align-self: flex-start; background: #1e1e1e; }
      .thinking    { color: #666; font-size: 12px; }
      #input-row {
        display: flex; gap: 6px; padding: 10px 12px;
        border-top: 1px solid #222; align-items: flex-end;
      }
      #chat-input {
        flex: 1; background: #1a1a1a; color: #f0f0f0; border: 1px solid #333;
        border-radius: 8px; padding: 6px 10px; font-size: 12px; resize: none;
        outline: none; font-family: inherit; min-height: 32px; max-height: 120px;
      }
      #send-btn {
        background: #1d4ed8; color: #fff; border: none;
        border-radius: 8px; width: 32px; height: 32px; cursor: pointer;
        font-size: 16px; flex-shrink: 0;
      }
      #send-btn:disabled { opacity: 0.4; cursor: default; }

      /* Main result area */
      #main { flex: 1; overflow: hidden; background: #0f0f0f; }
      #result-frame { width: 100%; height: 100%; border: none; display: none; }
      #empty {
        height: 100%; display: flex; align-items: center;
        justify-content: center; color: #444;
      }

      /* Modal */
      #key-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        display: flex; align-items: center; justify-content: center; z-index: 100;
      }
      #key-overlay.hidden { display: none; }
      .modal {
        background: #1a1a1a; border: 1px solid #2a2a2a;
        border-radius: 12px; padding: 24px; width: 360px;
      }
      .modal h3 { margin-bottom: 8px; }
      .modal p { color: #888; font-size: 12px; margin-bottom: 14px; line-height: 1.5; }
      .modal input[type="password"] {
        width: 100%; background: #111; color: #f0f0f0; border: 1px solid #333;
        border-radius: 8px; padding: 8px 12px; font-size: 14px;
        margin-bottom: 12px; outline: none; font-family: inherit;
      }
      .modal-actions { display: flex; gap: 8px; }
      .btn-primary {
        flex: 1; background: #1d4ed8; color: #fff; border: none;
        border-radius: 8px; padding: 8px 0; font-size: 14px; cursor: pointer;
      }
      .btn-primary:disabled { opacity: 0.4; cursor: default; }
      .btn-secondary {
        background: transparent; color: #888; border: 1px solid #333;
        border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Key modal -->
    <div id="key-overlay">
      <div class="modal">
        <h3>Gemini API Key</h3>
        <p>Your key stays in the browser and is never sent to any server.</p>
        <input type="password" id="key-input" placeholder="AIza..." />
        <div class="modal-actions">
          <button class="btn-primary" id="save-key-btn" disabled>Save</button>
          <button class="btn-secondary" id="cancel-key-btn" style="display:none">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Main layout -->
    <div id="app">
      <div id="sidebar">
        <div id="sidebar-header">
          <span style="font-weight:600">LocalFlow</span>
          <button id="key-btn" title="Edit API key">🔑</button>
        </div>
        <label id="upload-label">
          <input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none" />
          + Load CSV / Excel
        </label>
        <div id="messages"></div>
        <div id="input-row">
          <textarea id="chat-input" rows="1" placeholder="Load a file first" disabled></textarea>
          <button id="send-btn" disabled>↑</button>
        </div>
      </div>
      <div id="main">
        <div id="empty">Load a file to get started.</div>
        <iframe id="result-frame" sandbox="allow-scripts allow-downloads" title="Analysis result"></iframe>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
